<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanks &mdash; F&R Design & Marketing</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0a0a; --bg2: #111111; --border: #222222; --text: #f5f5f5; --muted: #9a9a9a; --blue: #2B7FFF; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; text-align: center; padding: 24px;
  }
  .box { max-width: 480px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px, 8vw, 56px); margin: 0 0 16px; }
  p { color: var(--muted); font-size: 17px; line-height: 1.6; margin: 0 0 28px; }
  a.btn {
    display: inline-block; background: var(--blue); color: #fff; text-decoration: none;
    padding: 14px 28px; border-radius: 8px; font-weight: 600;
  }
</style>
</head>
<body>
  <div class="box">
    <h1>Message Sent.</h1>
    <p>Thanks for reaching out &mdash; we'll get back to you within one business day with a plan and a price.</p>
    <a class="btn" href="/">&larr; Back to the Site</a>
  </div>
</body>
</html>
